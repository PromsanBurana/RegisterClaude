# Nixpacks build config for Railway
# - Use npm install (NOT npm ci) to avoid Nixpacks BuildKit cache mount
#   that triggers EBUSY on /app/node_modules/.cache when wiping the dir
# - Move npm cache outside /app to avoid the locked .cache folder

[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = ["npm install --prefer-offline --no-audit --no-fund"]

[phases.build]
cmds = ["npm run build"]

[start]
cmd = "npm start"

[variables]
NPM_CONFIG_CACHE = "/tmp/.npm"
NPM_CONFIG_FUND = "false"
NPM_CONFIG_AUDIT = "false"
